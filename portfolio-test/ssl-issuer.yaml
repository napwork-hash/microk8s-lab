apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-test
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: support@napskytech.com  # ganti email kamu
    privateKeySecretRef:
      name: letsencrypt-test-key
    solvers:
      - http01:
          ingress:
            ingressClassName: public